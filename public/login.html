<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950 text-slate-100">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Esports Tournament Manager</title>
  
  <!-- Tailwind CSS v4 -->
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/styles.css">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Outfit', sans-serif;
    }
  </style>
</head>
<body class="h-full flex items-center justify-center bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-black p-4">

  <!-- Main Container -->
  <div class="w-full max-w-md">
    
    <!-- Logo & Title -->
    <div class="text-center mb-8 fade-in">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-linear-to-br from-orange-500 to-violet-600 p-0.5 neon-glow-primary mb-4">
        <div class="w-full h-full bg-slate-950 rounded-2xl flex items-center justify-center">
          <!-- Stylized Trophy Icon -->
          <svg class="w-8 h-8 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V5a2 2 0 10-2 2h2zm-2 4h4M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8"></path>
          </svg>
        </div>
      </div>
      <h1 class="text-3xl font-extrabold tracking-tight bg-linear-to-r from-orange-500 to-violet-500 bg-clip-text text-transparent">
        ARENA MASTER
      </h1>
      <p class="text-sm text-slate-400 mt-2">Esports Tournament Management Portal</p>
    </div>

    <!-- Login Card -->
    <div class="glass-panel rounded-3xl p-8 border border-slate-800/80 neon-glow-accent fade-in">
      <h2 class="text-xl font-semibold text-slate-200 mb-6 text-center">Admin Access</h2>
      
      <!-- Alert Message -->
      <div id="alertBox" class="hidden mb-6 p-4 rounded-xl text-sm border"></div>

      <form id="loginForm" class="space-y-5">
        <!-- Username input -->
        <div>
          <label for="username" class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Username</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
              </svg>
            </span>
            <input type="text" id="username" name="username" required placeholder="admin"
              class="w-full bg-slate-900 border border-slate-800 rounded-xl py-3 pl-10 pr-4 text-sm text-slate-100 placeholder-slate-500 focus:outline-hidden focus:border-orange-500 focus:ring-1 focus:ring-orange-500 transition-all">
          </div>
        </div>

        <!-- Password input -->
        <div>
          <label for="password" class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Password</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
              </svg>
            </span>
            <input type="password" id="password" name="password" required placeholder="••••••••"
              class="w-full bg-slate-900 border border-slate-800 rounded-xl py-3 pl-10 pr-4 text-sm text-slate-100 placeholder-slate-500 focus:outline-hidden focus:border-orange-500 focus:ring-1 focus:ring-orange-500 transition-all">
          </div>
        </div>

        <!-- Submit Button -->
        <button type="submit" id="submitBtn"
          class="w-full bg-linear-to-r from-orange-500 to-violet-600 hover:from-orange-600 hover:to-violet-700 text-white font-bold py-3 rounded-xl shadow-lg hover:shadow-orange-500/20 active:scale-[0.99] transition-all cursor-pointer flex items-center justify-center">
          <span id="btnText">Sign In</span>
          <!-- Loading Spinner -->
          <svg id="btnSpinner" class="hidden animate-spin h-5 w-5 text-white ml-2" fill="none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
        </button>
      </form>
      
      <!-- Footer Note -->
      <div class="mt-6 text-center">
        <p class="text-xs text-slate-500">Demo Account Credentials:</p>
        <p class="text-xs text-slate-400 mt-1 font-mono">Username: <span class="text-orange-400">admin</span> / Password: <span class="text-orange-400">admin123</span></p>
        <p class="text-xs mt-4"><a href="/" class="text-violet-400 hover:text-violet-300 hover:underline">← Go back to Public Dashboard</a></p>
      </div>
    </div>
  </div>

  <script>
    // Check if already logged in, redirect to dashboard
    if (localStorage.getItem('adminToken')) {
      window.location.href = '/';
    }

    const loginForm = document.getElementById('loginForm');
    const alertBox = document.getElementById('alertBox');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const btnSpinner = document.getElementById('btnSpinner');

    const showAlert = (message, type) => {
      alertBox.textContent = message;
      alertBox.className = `mb-6 p-4 rounded-xl text-sm border ${
        type === 'error' 
          ? 'bg-red-500/10 border-red-500/30 text-red-400' 
          : 'bg-green-500/10 border-green-500/30 text-green-400'
      }`;
    };

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      // Reset UI state
      alertBox.className = 'hidden';
      submitBtn.disabled = true;
      btnText.textContent = 'Verifying...';
      btnSpinner.classList.remove('hidden');

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (data.success) {
          // Success
          showAlert(data.message, 'success');
          
          // Store token & username
          localStorage.setItem('adminToken', data.token);
          localStorage.setItem('adminUser', JSON.stringify(data.admin));

          // Redirect to index.html after 1 second
          setTimeout(() => {
            window.location.href = '/';
          }, 1000);
        } else {
          // Failure
          showAlert(data.message || 'Authentication failed.', 'error');
          submitBtn.disabled = false;
          btnText.textContent = 'Sign In';
          btnSpinner.classList.add('hidden');
        }
      } catch (err) {
        console.error('Error logging in:', err);
        showAlert('Cannot connect to server. Ensure backend is running.', 'error');
        submitBtn.disabled = false;
        btnText.textContent = 'Sign In';
        btnSpinner.classList.add('hidden');
      }
    });
  </script>
</body>
</html>
